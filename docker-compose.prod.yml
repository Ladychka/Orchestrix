services:
  backend:
    build: ./backend
    container_name: aiep_backend
    env_file:
      - .env
    depends_on:
      - postgres
      - qdrant
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: aiep_frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: aiep_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: aiep_certbot
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: aiep_postgres
    environment:
      POSTGRES_USER: aiep
      POSTGRES_PASSWORD: aiep
      POSTGRES_DB: aiep
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiep_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aiep_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  certbot-data:
  certbot-www:
